<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timbratura</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#F4F2EE;--bg2:#ECEAE5;--card:#FFFFFF;--border:#D8D4CC;--text:#1A1814;--muted:#7A7570;--green:#2D6A4F;--green-bg:#D8F3DC;--red:#C1121F;--red-bg:#FFE5E7;--radius:12px;--radius-sm:8px;--mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;}
.screen{display:none;}.screen.active{display:flex;flex-direction:column;min-height:100vh;}

.home-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:2rem 1rem;}
.home-header{text-align:center;margin-bottom:2.5rem;}
.home-header h1{font-family:var(--mono);font-size:1rem;font-weight:500;letter-spacing:.15em;color:var(--muted);text-transform:uppercase;}
.clock-display{font-family:var(--mono);font-size:clamp(3rem,12vw,5.5rem);font-weight:400;letter-spacing:-2px;color:var(--text);line-height:1;}
.date-display{font-size:.875rem;color:var(--muted);margin-top:.5rem;}
.conn-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#ccc;margin-right:6px;transition:background .3s;}
.conn-dot.online{background:var(--green);}
.conn-dot.offline{background:var(--red);}
.conn-status{font-size:.72rem;color:var(--muted);text-align:center;margin-top:.5rem;display:flex;align-items:center;justify-content:center;}

.pin-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:2rem 1.5rem;width:100%;max-width:340px;}
.pin-label{font-size:.75rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:1.25rem;text-align:center;}
.pin-dots{display:flex;justify-content:center;gap:14px;margin-bottom:1.75rem;}
.dot{width:13px;height:13px;border-radius:50%;border:1.5px solid var(--border);background:transparent;transition:all .12s;}
.dot.filled{background:var(--text);border-color:var(--text);}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.num-btn{font-family:var(--mono);background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px 0;font-size:1.25rem;font-weight:500;cursor:pointer;color:var(--text);transition:background .1s,transform .08s;user-select:none;}
.num-btn:active{background:var(--bg2);transform:scale(.96);}
.num-btn.action{font-size:.75rem;font-weight:600;color:var(--muted);}
.pin-error{font-size:.8rem;color:var(--red);text-align:center;margin-top:.75rem;min-height:1.2rem;}

.page-wrap{flex:1;padding:1.5rem 1rem;max-width:560px;margin:0 auto;width:100%;}
.back-btn{font-size:.8rem;color:var(--muted);cursor:pointer;margin-bottom:1.25rem;display:inline-flex;align-items:center;gap:6px;}
.back-btn:hover{color:var(--text);}
.steps{display:flex;align-items:center;margin-bottom:2rem;}
.step{display:flex;flex-direction:column;align-items:center;gap:4px;}
.step-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:600;font-family:var(--mono);}
.step-num.done{background:var(--green);color:#fff;}
.step-num.active{background:var(--text);color:#fff;}
.step-num.pending{background:var(--bg2);color:var(--muted);border:1px solid var(--border);}
.step-label{font-size:.65rem;color:var(--muted);font-weight:500;letter-spacing:.05em;text-transform:uppercase;}
.step-line{flex:1;height:1px;background:var(--border);margin:0 6px;margin-bottom:18px;}

.page-title{font-size:1.4rem;font-weight:600;margin-bottom:.25rem;}
.page-sub{font-size:.875rem;color:var(--muted);margin-bottom:1.5rem;}
.sede-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:1.5rem;}
.sede-btn{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.1rem .75rem;cursor:pointer;transition:all .12s;text-align:center;}
.sede-btn:hover{border-color:var(--text);}
.sede-btn.selected{border:2px solid var(--text);background:var(--bg2);}
.sede-btn .sede-ico{font-size:1.5rem;margin-bottom:6px;}
.sede-btn .sede-name{font-size:.85rem;font-weight:500;}
.no-sedi{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:2rem;text-align:center;color:var(--muted);font-size:.875rem;}

.greeting{font-size:1.5rem;font-weight:600;margin-bottom:.25rem;}
.location-tag{display:inline-flex;align-items:center;gap:5px;font-size:.8rem;color:var(--muted);background:var(--bg2);border-radius:99px;padding:4px 12px;margin-bottom:1.25rem;}
.action-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1rem;}
.action-btn{padding:1.25rem;border-radius:var(--radius);font-size:1rem;font-weight:600;cursor:pointer;border:none;transition:opacity .1s,transform .08s;font-family:var(--sans);}
.action-btn:active{opacity:.85;transform:scale(.98);}
.btn-entrata{background:var(--green);color:#fff;}
.btn-uscita{background:var(--red);color:#fff;}
.btn-cancel{width:100%;padding:.9rem;border-radius:var(--radius-sm);background:transparent;border:1px solid var(--border);font-size:.875rem;color:var(--muted);cursor:pointer;font-family:var(--sans);}
.btn-cancel:hover{background:var(--bg2);}

.log-box{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.25rem;margin-bottom:1rem;}
.log-box-title{font-size:.7rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:.75rem;}
.log-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--bg);font-size:.85rem;gap:8px;}
.log-row:last-child{border-bottom:none;}
.log-type-in{color:var(--green);font-weight:600;}
.log-type-out{color:var(--red);font-weight:600;}
.log-sede-tag{font-size:.72rem;background:var(--bg2);border-radius:99px;padding:2px 8px;color:var(--muted);white-space:nowrap;}
.log-time-val{font-family:var(--mono);font-size:.82rem;color:var(--muted);white-space:nowrap;}
.ore-box{background:var(--green-bg);border:1px solid #a8d5b5;border-radius:var(--radius);padding:.875rem 1.25rem;margin-bottom:1rem;display:flex;justify-content:space-between;align-items:center;}
.ore-box-label{font-size:.72rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--green);}
.ore-box-val{font-family:var(--mono);font-size:1.3rem;font-weight:500;color:var(--green);}

.confirm-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem 1rem;}
.confirm-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:2.5rem 2rem;max-width:360px;width:100%;text-align:center;}
.confirm-icon{font-size:3rem;margin-bottom:1rem;}
.confirm-name{font-size:1.3rem;font-weight:600;margin-bottom:.25rem;}
.confirm-detail{font-size:.875rem;color:var(--muted);}
.confirm-time-big{font-family:var(--mono);font-size:1.8rem;font-weight:500;margin:.75rem 0;}
.confirm-sede{display:inline-flex;align-items:center;gap:5px;font-size:.8rem;background:var(--bg2);border-radius:99px;padding:4px 14px;color:var(--muted);margin-bottom:.5rem;}
.confirm-ore{font-size:.85rem;color:var(--green);font-weight:500;margin-bottom:1.25rem;}
.progress-bar{height:3px;background:var(--bg2);border-radius:99px;overflow:hidden;}
.progress-fill{height:100%;background:var(--text);border-radius:99px;animation:prog 3s linear forwards;}
@keyframes prog{from{width:0%}to{width:100%}}

.loading{display:flex;align-items:center;justify-content:center;flex:1;flex-direction:column;gap:1rem;color:var(--muted);font-size:.9rem;}
.spinner{width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--text);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
  <link rel="manifest" href="/manifest-timbratura.json">
  <meta name="theme-color" content="#0D9488">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Timbratura">
  <link rel="apple-touch-icon" href="/icons/icon-timbratura-192.png">
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('/sw-timbratura.js'));
    }
  </script>
</head>
<body>

<div id="screen-loading" class="screen active">
  <div class="loading"><div class="spinner"></div>Connessione in corso...</div>
</div>

<div id="screen-home" class="screen">
  <div class="home-wrap">
    <div class="home-header">
      <h1>Timbratura</h1>
      <div class="clock-display" id="clock">--:--:--</div>
      <div class="date-display" id="dateStr">---</div>
      <div class="conn-status"><span class="conn-dot" id="connDot"></span><span id="connLabel">Connessione...</span></div>
    </div>
    <div class="pin-card">
      <div class="pin-label">Inserisci PIN</div>
      <div class="pin-dots">
        <div class="dot" id="d0"></div><div class="dot" id="d1"></div>
        <div class="dot" id="d2"></div><div class="dot" id="d3"></div>
      </div>
      <div class="numpad">
        <button class="num-btn" onclick="pressNum('1')">1</button>
        <button class="num-btn" onclick="pressNum('2')">2</button>
        <button class="num-btn" onclick="pressNum('3')">3</button>
        <button class="num-btn" onclick="pressNum('4')">4</button>
        <button class="num-btn" onclick="pressNum('5')">5</button>
        <button class="num-btn" onclick="pressNum('6')">6</button>
        <button class="num-btn" onclick="pressNum('7')">7</button>
        <button class="num-btn" onclick="pressNum('8')">8</button>
        <button class="num-btn" onclick="pressNum('9')">9</button>
        <button class="num-btn action" onclick="clearPin()">Canc</button>
        <button class="num-btn" onclick="pressNum('0')">0</button>
        <button class="num-btn action" onclick="backspace()">⌫</button>
      </div>
      <div class="pin-error" id="pinError"></div>
    </div>
  </div>
</div>

<div id="screen-sede" class="screen">
  <div class="page-wrap">
    <div class="back-btn" onclick="goHome()">← Indietro</div>
    <div class="steps">
      <div class="step"><div class="step-num done">✓</div><div class="step-label">PIN</div></div>
      <div class="step-line"></div>
      <div class="step"><div class="step-num active">2</div><div class="step-label">Sede</div></div>
      <div class="step-line"></div>
      <div class="step"><div class="step-num pending">3</div><div class="step-label">Timbra</div></div>
    </div>
    <p class="page-title" id="sedeGreeting"></p>
    <p class="page-sub">Seleziona dove stai lavorando oggi</p>
    <div class="sede-grid" id="sedeGrid"></div>
    <button class="btn-cancel" onclick="goHome()">Annulla</button>
  </div>
</div>

<div id="screen-action" class="screen">
  <div class="page-wrap">
    <div class="back-btn" onclick="goSede()">← Cambia sede</div>
    <div class="steps">
      <div class="step"><div class="step-num done">✓</div><div class="step-label">PIN</div></div>
      <div class="step-line"></div>
      <div class="step"><div class="step-num done">✓</div><div class="step-label">Sede</div></div>
      <div class="step-line"></div>
      <div class="step"><div class="step-num active">3</div><div class="step-label">Timbra</div></div>
    </div>
    <p class="greeting" id="actionGreeting"></p>
    <div class="location-tag">📍 <span id="actionSede"></span></div>
    <div class="ore-box" id="oreOggiBox" style="display:none;">
      <div class="ore-box-label">Ore lavorate oggi</div>
      <div class="ore-box-val" id="oreOggiVal">0h 00min</div>
    </div>
    <div class="log-box" id="myLogBox" style="display:none;">
      <div class="log-box-title">Le mie timbrature di oggi</div>
      <div id="myLogList"></div>
    </div>
    <div class="action-btns">
      <button class="action-btn btn-entrata" onclick="timbra('entrata')">▲ Entrata</button>
      <button class="action-btn btn-uscita" onclick="timbra('uscita')">▼ Uscita</button>
    </div>
    <button class="btn-cancel" onclick="goHome()">Annulla</button>
  </div>
</div>

<div id="screen-confirm" class="screen">
  <div class="confirm-wrap">
    <div class="confirm-card">
      <div class="confirm-icon" id="cfIcon"></div>
      <div class="confirm-name" id="cfName"></div>
      <div class="confirm-detail" id="cfType"></div>
      <div class="confirm-time-big" id="cfTime"></div>
      <div class="confirm-sede" id="cfSede"></div>
      <div class="confirm-ore" id="cfOre"></div>
      <div class="progress-bar"><div class="progress-fill" id="cfBar"></div></div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
import { getDatabase, ref, set, get, push, onValue, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBNfQrd0jmEIq9qvEI0go3N56AFnKwxtWk",
  authDomain: "timbratura-d7e66.firebaseapp.com",
  databaseURL: "https://timbratura-d7e66-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "timbratura-d7e66",
  storageBucket: "timbratura-d7e66.firebasestorage.app",
  messagingSenderId: "354387504503",
  appId: "1:354387504503:web:b3da687674ed0429e0c572"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ── Stato locale (cache dal DB) ──
let employees = [];
let sedi = [];
let empRecords = []; // solo mese corrente per questo dipendente
let pinBuf = '', currentEmp = null, currentSede = null, cfTimer = null;

// ── Connessione ──
const connRef = ref(db, '.info/connected');
onValue(connRef, snap => {
  const online = snap.val() === true;
  const dot = document.getElementById('connDot');
  const lbl = document.getElementById('connLabel');
  if (dot) { dot.className = 'conn-dot ' + (online ? 'online' : 'offline'); }
  if (lbl) { lbl.textContent = online ? 'Connesso' : 'Offline'; }
});

// ── Init: carica dati dal DB e poi mostra home ──
async function init() {
  try {
    await initDefaultData();
    await loadEmployees();
    await loadSedi();
    checkMonthReset();
    showScreen('home');
  } catch(e) {
    console.error(e);
    showScreen('home');
  }
}

async function initDefaultData() {
  const snap = await get(ref(db, 'config/initialized'));
  if (snap.val()) return;
  // Prima volta: scrivi dati di default
  await set(ref(db, 'config'), {
    initialized: true,
    adminPin: '0000',
    lastResetMonth: todayStr().slice(0,7)
  });
  await set(ref(db, 'employees'), {
    emp1: { id: 'emp1', name: 'Mario Rossi', pin: '1234' },
    emp2: { id: 'emp2', name: 'Giulia Bianchi', pin: '5678' },
    emp3: { id: 'emp3', name: 'Luca Verdi', pin: '9012' }
  });
  await set(ref(db, 'sedi'), {
    sede1: { id: 'sede1', name: 'Sede Centrale' },
    sede2: { id: 'sede2', name: 'Filiale Nord' },
    sede3: { id: 'sede3', name: 'Filiale Sud' }
  });
}

async function loadEmployees() {
  const snap = await get(ref(db, 'employees'));
  employees = snap.val() ? Object.values(snap.val()) : [];
}

async function loadSedi() {
  const snap = await get(ref(db, 'sedi'));
  sedi = snap.val() ? Object.values(snap.val()) : [];
}

async function checkMonthReset() {
  const snap = await get(ref(db, 'config/lastResetMonth'));
  const lastReset = snap.val() || '';
  const thisMonth = todayStr().slice(0,7);
  if (lastReset !== thisMonth) {
    // Cancella empRecords del mese scorso
    await set(ref(db, 'empRecords'), null);
    await set(ref(db, 'config/lastResetMonth'), thisMonth);
  }
}

async function loadMyEmpRecords(empId) {
  const today = todayStr();
  const snap = await get(ref(db, 'empRecords'));
  const all = snap.val() ? Object.values(snap.val()) : [];
  return all.filter(r => r.empId === empId && r.date === today);
}

// ── Schermate ──
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
  window.scrollTo(0,0);
}

function goHome() {
  pinBuf = ''; updateDots();
  currentEmp = null; currentSede = null;
  if (cfTimer) clearTimeout(cfTimer);
  document.getElementById('pinError').textContent = '';
  showScreen('home');
}

function goSede() { renderSedeGrid(); showScreen('sede'); }

// ── Orologio ──
function updateClock() {
  const now = new Date();
  if(document.getElementById('clock'))
    document.getElementById('clock').textContent = now.toTimeString().slice(0,8);
  const D=['Domenica','Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato'];
  const M=['gennaio','febbraio','marzo','aprile','maggio','giugno','luglio','agosto','settembre','ottobre','novembre','dicembre'];
  if(document.getElementById('dateStr'))
    document.getElementById('dateStr').textContent = D[now.getDay()]+' '+now.getDate()+' '+M[now.getMonth()]+' '+now.getFullYear();
}
updateClock(); setInterval(updateClock, 1000);

// ── PIN ──
function updateDots() { for(let i=0;i<4;i++) document.getElementById('d'+i).classList.toggle('filled',i<pinBuf.length); }

window.pressNum = function(n) {
  if(pinBuf.length>=4) return;
  pinBuf+=n; updateDots();
  document.getElementById('pinError').textContent='';
  if(pinBuf.length===4) setTimeout(checkPin,120);
};
window.clearPin = function() { pinBuf=''; updateDots(); };
window.backspace = function() { pinBuf=pinBuf.slice(0,-1); updateDots(); };

async function checkPin() {
  await loadEmployees();
  const emp = employees.find(e => e.pin === pinBuf);
  if (!emp) {
    document.getElementById('pinError').textContent = 'PIN non riconosciuto';
    pinBuf=''; updateDots(); return;
  }
  currentEmp = emp;
  document.getElementById('sedeGreeting').textContent = 'Ciao, ' + emp.name + '!';
  await loadSedi();
  renderSedeGrid();
  showScreen('sede');
}

// ── Sede ──
const ICONS=['🏢','🏬','🏭','🏪','🏗️','🏦','🏛️','🏠','🌐','🏝️'];

function renderSedeGrid() {
  const g = document.getElementById('sedeGrid');
  if (!sedi.length) { g.innerHTML='<div class="no-sedi">Nessuna sede configurata.<br>Contatta l\'amministratore.</div>'; return; }
  g.innerHTML = sedi.map((s,i) =>
    `<div class="sede-btn" id="sb-${s.id}" onclick="selectSede('${s.id}')">
      <div class="sede-ico">${ICONS[i%ICONS.length]}</div>
      <div class="sede-name">${s.name}</div>
    </div>`
  ).join('');
}

window.selectSede = function(id) {
  currentSede = sedi.find(s => s.id === id);
  document.querySelectorAll('.sede-btn').forEach(b=>b.classList.remove('selected'));
  const b = document.getElementById('sb-'+id); if(b) b.classList.add('selected');
  setTimeout(showActionScreen, 200);
};

// ── Azione ──
function todayStr() { return new Date().toISOString().slice(0,10); }
function calcMinutes(recs) {
  const sorted=[...recs].sort((a,b)=>a.time.localeCompare(b.time));
  let tot=0,lastIn=null;
  sorted.forEach(r=>{ if(r.type==='entrata'){lastIn=r.time;} else if(r.type==='uscita'&&lastIn){const[h1,m1]=lastIn.split(':').map(Number);const[h2,m2]=r.time.split(':').map(Number);tot+=(h2*60+m2)-(h1*60+m1);lastIn=null;} });
  return tot;
}
function fmtMin(min){const h=Math.floor(min/60),m=min%60;return h+'h '+(m<10?'0':'')+m+'min';}

async function showActionScreen() {
  document.getElementById('actionGreeting').textContent = currentEmp.name;
  document.getElementById('actionSede').textContent = currentSede.name;

  const myToday = await loadMyEmpRecords(currentEmp.id);

  const minOggi = calcMinutes(myToday);
  if (minOggi > 0) {
    document.getElementById('oreOggiBox').style.display = 'flex';
    document.getElementById('oreOggiVal').textContent = fmtMin(minOggi);
  } else {
    document.getElementById('oreOggiBox').style.display = 'none';
  }

  if (myToday.length > 0) {
    document.getElementById('myLogBox').style.display = 'block';
    document.getElementById('myLogList').innerHTML = myToday
      .sort((a,b)=>a.time.localeCompare(b.time))
      .map(r=>`<div class="log-row">
        <span class="${r.type==='entrata'?'log-type-in':'log-type-out'}">${r.type==='entrata'?'▲ Entrata':'▼ Uscita'}</span>
        <span class="log-sede-tag">${r.sedeName}</span>
        <span class="log-time-val">${r.time}</span>
      </div>`).join('');
  } else {
    document.getElementById('myLogBox').style.display = 'none';
  }
  showScreen('action');
}

window.goHome = goHome;
window.goSede = goSede;

// ── Timbra ──
window.timbra = async function(type) {
  const now = new Date();
  const time = now.toTimeString().slice(0,8);
  const date = todayStr();
  const month = date.slice(0,7);

  const rec = {
    empId: currentEmp.id,
    empName: currentEmp.name,
    sedeId: currentSede.id,
    sedeName: currentSede.name,
    type, date, time, month
  };

  // Salva in adminRecords (permanente) e empRecords (mese corrente)
  await push(ref(db, 'adminRecords'), rec);
  await push(ref(db, 'empRecords'), rec);

  // Ricalcola ore oggi
  const myToday = await loadMyEmpRecords(currentEmp.id);
  // Aggiunge la timbratura appena fatta (non ancora nel db locale)
  const allToday = [...myToday, rec];
  const minOggi = calcMinutes(allToday);

  document.getElementById('cfIcon').textContent = type==='entrata'?'✅':'🔴';
  document.getElementById('cfName').textContent = currentEmp.name;
  document.getElementById('cfType').textContent = type==='entrata'?'Entrata registrata':'Uscita registrata';
  document.getElementById('cfTime').textContent = time.slice(0,5);
  document.getElementById('cfSede').innerHTML = '📍 '+currentSede.name;
  document.getElementById('cfOre').textContent = minOggi>0?'Ore lavorate oggi: '+fmtMin(minOggi):'';

  const bar = document.getElementById('cfBar');
  bar.style.animation='none'; bar.offsetHeight; bar.style.animation='';
  showScreen('confirm');
  if(cfTimer) clearTimeout(cfTimer);
  cfTimer = setTimeout(goHome, 3100);
};

init();
</script>
</body>
</html>
