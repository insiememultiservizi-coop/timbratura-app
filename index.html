<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Timbratura</title>

<!-- PWA -->
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#0D9488">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Timbratura">
<link rel="apple-touch-icon" href="./icons/icon-192.png">

<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --teal: #0D9488;
  --teal-dark: #0F766E;
  --teal-light: #CCFBF1;
  --red: #DC2626;
  --red-light: #FEE2E2;
  --bg: #F8FAFC;
  --bg2: #F1F5F9;
  --card: #FFFFFF;
  --border: #E2E8F0;
  --text: #0F172A;
  --muted: #64748B;
  --mono: 'DM Mono', monospace;
  --sans: 'DM Sans', sans-serif;
  --radius: 16px;
  --radius-sm: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body { font-family: var(--sans); background: var(--bg); color: var(--text); }

/* SCHERMATE */
.screen { display: none; position: fixed; inset: 0; overflow-y: auto; }
.screen.active { display: flex; flex-direction: column; }

/* LOADING */
#s-loading { align-items: center; justify-content: center; background: var(--teal); }
.spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { color: white; font-size: .9rem; margin-top: 1rem; opacity: .8; }

/* HOME */
#s-home { background: var(--bg); }
.home-top { background: var(--teal); padding: 3rem 1.5rem 2.5rem; text-align: center; }
.app-title { font-family: var(--mono); font-size: .75rem; font-weight: 500; letter-spacing: .2em; color: rgba(255,255,255,.7); text-transform: uppercase; margin-bottom: .75rem; }
.clock { font-family: var(--mono); font-size: clamp(3.5rem, 15vw, 5rem); font-weight: 400; color: white; line-height: 1; letter-spacing: -2px; }
.datex { font-size: .875rem; color: rgba(255,255,255,.75); margin-top: .4rem; }
.conn-row { display: flex; align-items: center; justify-content: center; gap: 6px; margin-top: .75rem; }
.conn-dot { width: 7px; height: 7px; border-radius: 50%; background: rgba(255,255,255,.4); transition: background .3s; }
.conn-dot.on { background: #4ADE80; }
.conn-dot.off { background: #F87171; }
.conn-lbl { font-size: .72rem; color: rgba(255,255,255,.6); }

.home-body { padding: 1.5rem 1.25rem; flex: 1; }
.pin-card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); padding: 1.75rem 1.5rem; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
.pin-lbl { font-size: .72rem; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); text-align: center; margin-bottom: 1.25rem; }
.pin-dots { display: flex; justify-content: center; gap: 16px; margin-bottom: 1.75rem; }
.dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid var(--border); background: transparent; transition: all .15s; }
.dot.filled { background: var(--teal); border-color: var(--teal); transform: scale(1.1); }
.numpad { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; max-width: 280px; margin: 0 auto; }
.nk { font-family: var(--mono); background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 18px 0; font-size: 1.3rem; font-weight: 500; cursor: pointer; color: var(--text); user-select: none; transition: all .1s; text-align: center; }
.nk:active { background: var(--teal-light); border-color: var(--teal); transform: scale(.95); }
.nk.sm { font-size: .78rem; font-weight: 600; color: var(--muted); }
.pin-err { font-size: .82rem; color: var(--red); text-align: center; margin-top: .875rem; min-height: 1.1rem; }

/* SEDE */
#s-sede, #s-action { background: var(--bg); }
.page-header { background: var(--teal); padding: 3.5rem 1.25rem 1.5rem; }
.back-btn { display: inline-flex; align-items: center; gap: 6px; font-size: .82rem; color: rgba(255,255,255,.8); cursor: pointer; margin-bottom: .875rem; }
.back-btn:active { opacity: .6; }
.page-htitle { font-size: 1.4rem; font-weight: 600; color: white; }
.page-hsub { font-size: .85rem; color: rgba(255,255,255,.7); margin-top: .25rem; }

.steps { display: flex; align-items: center; padding: 1.25rem 1.25rem 0; }
.st { display: flex; flex-direction: column; align-items: center; gap: 3px; }
.st-num { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: .72rem; font-weight: 700; }
.st-num.done { background: var(--teal); color: white; }
.st-num.active { background: var(--text); color: white; }
.st-num.pend { background: var(--bg2); color: var(--muted); border: 1px solid var(--border); }
.st-lbl { font-size: .6rem; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
.st-line { flex: 1; height: 1px; background: var(--border); margin: 0 6px 14px; }

.page-body { padding: 1.25rem; }

.sede-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px,1fr)); gap: 10px; margin-bottom: 1.25rem; }
.sede-card { background: var(--card); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 1.1rem .75rem; cursor: pointer; text-align: center; transition: all .12s; }
.sede-card:active { transform: scale(.97); }
.sede-card.sel { border-color: var(--teal); border-width: 2px; background: var(--teal-light); }
.sede-ico { font-size: 1.6rem; margin-bottom: 6px; }
.sede-nm { font-size: .85rem; font-weight: 500; }
.no-sedi { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 2rem; text-align: center; color: var(--muted); font-size: .875rem; }

/* ACTION */
.emp-name { font-size: 1.5rem; font-weight: 600; }
.sede-tag { display: inline-flex; align-items: center; gap: 5px; background: var(--bg2); border-radius: 99px; padding: 4px 12px; font-size: .8rem; color: var(--muted); margin: .5rem 0 1.1rem; }
.ore-box { background: var(--teal-light); border: 1px solid #99F6E4; border-radius: var(--radius-sm); padding: .875rem 1.1rem; margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: center; }
.ore-lbl { font-size: .7rem; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--teal-dark); }
.ore-val { font-family: var(--mono); font-size: 1.3rem; font-weight: 500; color: var(--teal-dark); }
.log-box { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: .875rem 1.1rem; margin-bottom: 1rem; }
.log-title { font-size: .68rem; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-bottom: .6rem; }
.log-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid var(--bg2); font-size: .84rem; gap: 8px; }
.log-row:last-child { border-bottom: none; }
.log-in { color: var(--teal); font-weight: 600; }
.log-out { color: var(--red); font-weight: 600; }
.log-sede-tag { font-size: .7rem; background: var(--bg2); border-radius: 99px; padding: 2px 8px; color: var(--muted); }
.log-t { font-family: var(--mono); font-size: .8rem; color: var(--muted); }
.act-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: .875rem; }
.act-btn { padding: 1.25rem; border-radius: var(--radius); font-size: 1rem; font-weight: 600; cursor: pointer; border: none; font-family: var(--sans); transition: all .1s; }
.act-btn:active { transform: scale(.97); opacity: .9; }
.btn-in { background: var(--teal); color: white; }
.btn-out { background: var(--red); color: white; }
.btn-cancel { width: 100%; padding: .9rem; border-radius: var(--radius-sm); background: transparent; border: 1px solid var(--border); font-size: .875rem; color: var(--muted); cursor: pointer; font-family: var(--sans); }
.btn-cancel:active { background: var(--bg2); }

/* CONFIRM */
#s-confirm { align-items: center; justify-content: center; background: rgba(15,23,42,.5); backdrop-filter: blur(4px); }
.cf-card { background: var(--card); border-radius: var(--radius); padding: 2.5rem 2rem; max-width: 340px; width: 90%; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,.15); }
.cf-icon { font-size: 3.5rem; margin-bottom: .875rem; }
.cf-name { font-size: 1.2rem; font-weight: 600; margin-bottom: .25rem; }
.cf-type { font-size: .875rem; color: var(--muted); margin-bottom: .25rem; }
.cf-time { font-family: var(--mono); font-size: 2rem; font-weight: 500; margin: .75rem 0 .25rem; }
.cf-sede { font-size: .8rem; color: var(--muted); background: var(--bg2); border-radius: 99px; display: inline-flex; align-items: center; gap: 5px; padding: 4px 14px; margin-bottom: .5rem; }
.cf-ore { font-size: .875rem; font-weight: 500; color: var(--teal); margin-bottom: 1.25rem; min-height: 1.1rem; }
.cf-bar { height: 3px; background: var(--bg2); border-radius: 99px; overflow: hidden; }
.cf-fill { height: 100%; background: var(--teal); border-radius: 99px; animation: cfprog 3s linear forwards; }
@keyframes cfprog { from{width:0} to{width:100%} }
</style>
</head>
<body>

<!-- LOADING -->
<div id="s-loading" class="screen active">
  <div class="spinner"></div>
  <div class="loading-text">Connessione...</div>
</div>

<!-- HOME -->
<div id="s-home" class="screen">
  <div class="home-top">
    <div class="app-title">Timbratura</div>
    <div class="clock" id="clock">--:--:--</div>
    <div class="datex" id="datex">---</div>
    <div class="conn-row">
      <div class="conn-dot" id="cdot"></div>
      <div class="conn-lbl" id="clbl">...</div>
    </div>
  </div>
  <div class="home-body">
    <div class="pin-card">
      <div class="pin-lbl">Inserisci il tuo PIN</div>
      <div class="pin-dots">
        <div class="dot" id="d0"></div>
        <div class="dot" id="d1"></div>
        <div class="dot" id="d2"></div>
        <div class="dot" id="d3"></div>
      </div>
      <div class="numpad">
        <div class="nk" onclick="pn('1')">1</div>
        <div class="nk" onclick="pn('2')">2</div>
        <div class="nk" onclick="pn('3')">3</div>
        <div class="nk" onclick="pn('4')">4</div>
        <div class="nk" onclick="pn('5')">5</div>
        <div class="nk" onclick="pn('6')">6</div>
        <div class="nk" onclick="pn('7')">7</div>
        <div class="nk" onclick="pn('8')">8</div>
        <div class="nk" onclick="pn('9')">9</div>
        <div class="nk sm" onclick="cp()">Canc</div>
        <div class="nk" onclick="pn('0')">0</div>
        <div class="nk sm" onclick="bp()">⌫</div>
      </div>
      <div class="pin-err" id="perr"></div>
    </div>
  </div>
</div>

<!-- SEDE -->
<div id="s-sede" class="screen">
  <div class="page-header">
    <div class="back-btn" onclick="goHome()">← Indietro</div>
    <div class="page-htitle" id="sedeTitle">Ciao!</div>
    <div class="page-hsub">Seleziona la sede di lavoro</div>
  </div>
  <div class="steps">
    <div class="st"><div class="st-num done">✓</div><div class="st-lbl">PIN</div></div>
    <div class="st-line"></div>
    <div class="st"><div class="st-num active">2</div><div class="st-lbl">Sede</div></div>
    <div class="st-line"></div>
    <div class="st"><div class="st-num pend">3</div><div class="st-lbl">Timbra</div></div>
  </div>
  <div class="page-body">
    <div class="sede-grid" id="sedeGrid"></div>
    <div class="btn-cancel" onclick="goHome()">Annulla</div>
  </div>
</div>

<!-- ACTION -->
<div id="s-action" class="screen">
  <div class="page-header">
    <div class="back-btn" onclick="goSede()">← Cambia sede</div>
    <div class="page-htitle" id="actName"></div>
  </div>
  <div class="steps">
    <div class="st"><div class="st-num done">✓</div><div class="st-lbl">PIN</div></div>
    <div class="st-line"></div>
    <div class="st"><div class="st-num done">✓</div><div class="st-lbl">Sede</div></div>
    <div class="st-line"></div>
    <div class="st"><div class="st-num active">3</div><div class="st-lbl">Timbra</div></div>
  </div>
  <div class="page-body">
    <div class="sede-tag">📍 <span id="actSede"></span></div>
    <div class="ore-box" id="oreBox" style="display:none">
      <div class="ore-lbl">Ore lavorate oggi</div>
      <div class="ore-val" id="oreVal"></div>
    </div>
    <div class="log-box" id="logBox" style="display:none">
      <div class="log-title">Le mie timbrature di oggi</div>
      <div id="logList"></div>
    </div>
    <div class="act-btns">
      <div class="act-btn btn-in" onclick="timbra('entrata')">▲ Entrata</div>
      <div class="act-btn btn-out" onclick="timbra('uscita')">▼ Uscita</div>
    </div>
    <div class="btn-cancel" onclick="goHome()">Annulla</div>
  </div>
</div>

<!-- CONFIRM -->
<div id="s-confirm" class="screen">
  <div class="cf-card">
    <div class="cf-icon" id="cfIcon"></div>
    <div class="cf-name" id="cfName"></div>
    <div class="cf-type" id="cfType"></div>
    <div class="cf-time" id="cfTime"></div>
    <div class="cf-sede" id="cfSede"></div>
    <div class="cf-ore" id="cfOre"></div>
    <div class="cf-bar"><div class="cf-fill" id="cfFill"></div></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
import { getDatabase, ref, set, get, push, onValue } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-database.js";

// ── Service Worker ──
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js')
    .then(r => console.log('SW ok', r.scope))
    .catch(e => console.warn('SW err', e));
}

// ── Firebase ──
const app = initializeApp({
  apiKey: "AIzaSyBNfQrd0jmEIq9qvEI0go3N56AFnKwxtWk",
  authDomain: "timbratura-d7e66.firebaseapp.com",
  databaseURL: "https://timbratura-d7e66-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "timbratura-d7e66",
  storageBucket: "timbratura-d7e66.firebasestorage.app",
  messagingSenderId: "354387504503",
  appId: "1:354387504503:web:b3da687674ed0429e0c572"
});
const db = getDatabase(app);

// ── Stato ──
let employees = [], sedi = [];
let pinBuf = '', curEmp = null, curSede = null, cfTimer = null;

// ── Connessione ──
onValue(ref(db, '.info/connected'), s => {
  const on = s.val() === true;
  const dot = document.getElementById('cdot');
  const lbl = document.getElementById('clbl');
  if (dot) dot.className = 'conn-dot ' + (on ? 'on' : 'off');
  if (lbl) lbl.textContent = on ? 'Connesso' : 'Offline';
});

// ── Init ──
async function init() {
  try {
    // Dati di default se primo avvio
    const snap = await get(ref(db, 'config/initialized'));
    if (!snap.val()) {
      await set(ref(db, 'config'), {
        initialized: true,
        adminPin: '0000',
        lastResetMonth: todayStr().slice(0,7)
      });
      await set(ref(db, 'employees'), {
        emp1: {id:'emp1', name:'Mario Rossi', pin:'1234'},
        emp2: {id:'emp2', name:'Giulia Bianchi', pin:'5678'},
        emp3: {id:'emp3', name:'Luca Verdi', pin:'9012'}
      });
      await set(ref(db, 'sedi'), {
        sede1: {id:'sede1', name:'Sede Centrale'},
        sede2: {id:'sede2', name:'Filiale Nord'},
        sede3: {id:'sede3', name:'Filiale Sud'}
      });
    }
    await loadAll();
    await checkReset();
  } catch(e) { console.error(e); }
  showScreen('home');
}

async function loadAll() {
  const [es, ss] = await Promise.all([
    get(ref(db, 'employees')),
    get(ref(db, 'sedi'))
  ]);
  employees = es.val() ? Object.values(es.val()) : [];
  sedi = ss.val() ? Object.values(ss.val()) : [];
}

async function checkReset() {
  const snap = await get(ref(db, 'config/lastResetMonth'));
  const last = snap.val() || '';
  const now = todayStr().slice(0,7);
  if (last !== now) {
    await set(ref(db, 'empRecords'), null);
    await set(ref(db, 'config/lastResetMonth'), now);
  }
}

// ── Schermate ──
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('s-' + id).classList.add('active');
}

function goHome() {
  pinBuf = ''; updateDots();
  curEmp = null; curSede = null;
  if (cfTimer) clearTimeout(cfTimer);
  document.getElementById('perr').textContent = '';
  showScreen('home');
}
function goSede() { showScreen('sede'); }

window.goHome = goHome;
window.goSede = goSede;

// ── Orologio ──
function tick() {
  const now = new Date();
  const ce = document.getElementById('clock');
  const de = document.getElementById('datex');
  if (ce) ce.textContent = now.toTimeString().slice(0,8);
  if (de) {
    const D = ['Domenica','Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato'];
    const M = ['gennaio','febbraio','marzo','aprile','maggio','giugno','luglio','agosto','settembre','ottobre','novembre','dicembre'];
    de.textContent = D[now.getDay()] + ' ' + now.getDate() + ' ' + M[now.getMonth()] + ' ' + now.getFullYear();
  }
}
tick(); setInterval(tick, 1000);

// ── PIN ──
function updateDots() {
  for (let i = 0; i < 4; i++)
    document.getElementById('d'+i).classList.toggle('filled', i < pinBuf.length);
}
window.pn = async function(n) {
  if (pinBuf.length >= 4) return;
  pinBuf += n; updateDots();
  document.getElementById('perr').textContent = '';
  if (pinBuf.length === 4) setTimeout(checkPin, 150);
};
window.cp = function() { pinBuf = ''; updateDots(); };
window.bp = function() { pinBuf = pinBuf.slice(0,-1); updateDots(); };

async function checkPin() {
  await loadAll();
  const emp = employees.find(e => e.pin === pinBuf);
  if (!emp) {
    document.getElementById('perr').textContent = 'PIN non riconosciuto';
    pinBuf = ''; updateDots(); return;
  }
  curEmp = emp;
  document.getElementById('sedeTitle').textContent = 'Ciao, ' + emp.name + '!';
  renderSedi();
  showScreen('sede');
}

// ── Sedi ──
const ICONS = ['🏢','🏬','🏭','🏪','🏗️','🏦','🏛️','🏠','🌐','🏝️'];
function renderSedi() {
  const g = document.getElementById('sedeGrid');
  if (!sedi.length) {
    g.innerHTML = '<div class="no-sedi">Nessuna sede configurata.<br>Contatta l\'amministratore.</div>';
    return;
  }
  g.innerHTML = sedi.map((s,i) =>
    `<div class="sede-card" id="sc-${s.id}" onclick="selSede('${s.id}')">
      <div class="sede-ico">${ICONS[i % ICONS.length]}</div>
      <div class="sede-nm">${s.name}</div>
    </div>`
  ).join('');
}
window.selSede = function(id) {
  curSede = sedi.find(s => s.id === id);
  document.querySelectorAll('.sede-card').forEach(c => c.classList.remove('sel'));
  const el = document.getElementById('sc-' + id); if (el) el.classList.add('sel');
  setTimeout(showAction, 180);
};

// ── Action ──
function todayStr() { return new Date().toISOString().slice(0,10); }
function calcMin(recs) {
  const sorted = [...recs].sort((a,b) => a.time.localeCompare(b.time));
  let tot = 0, lastIn = null;
  sorted.forEach(r => {
    if (r.type === 'entrata') { lastIn = r.time; }
    else if (r.type === 'uscita' && lastIn) {
      const [h1,m1] = lastIn.split(':').map(Number);
      const [h2,m2] = r.time.split(':').map(Number);
      tot += (h2*60+m2) - (h1*60+m1);
      lastIn = null;
    }
  });
  return tot;
}
function fmtMin(min) {
  const h = Math.floor(min/60), m = min%60;
  return h + 'h ' + (m < 10 ? '0' : '') + m + 'min';
}

async function getMyToday() {
  const snap = await get(ref(db, 'empRecords'));
  const all = snap.val() ? Object.values(snap.val()) : [];
  return all.filter(r => r.empId === curEmp.id && r.date === todayStr());
}

async function showAction() {
  document.getElementById('actName').textContent = curEmp.name;
  document.getElementById('actSede').textContent = curSede.name;

  const recs = await getMyToday();
  const min = calcMin(recs);

  if (min > 0) {
    document.getElementById('oreBox').style.display = 'flex';
    document.getElementById('oreVal').textContent = fmtMin(min);
  } else {
    document.getElementById('oreBox').style.display = 'none';
  }

  if (recs.length > 0) {
    document.getElementById('logBox').style.display = 'block';
    document.getElementById('logList').innerHTML = recs
      .sort((a,b) => a.time.localeCompare(b.time))
      .map(r => `<div class="log-row">
        <span class="${r.type==='entrata'?'log-in':'log-out'}">${r.type==='entrata'?'▲ Entrata':'▼ Uscita'}</span>
        <span class="log-sede-tag">${r.sedeName}</span>
        <span class="log-t">${r.time}</span>
      </div>`).join('');
  } else {
    document.getElementById('logBox').style.display = 'none';
  }
  showScreen('action');
}

window.timbra = async function(type) {
  const now = new Date();
  const time = now.toTimeString().slice(0,8);
  const date = todayStr();
  const rec = {
    empId: curEmp.id, empName: curEmp.name,
    sedeId: curSede.id, sedeName: curSede.name,
    type, date, time, month: date.slice(0,7)
  };
  await push(ref(db, 'adminRecords'), rec);
  await push(ref(db, 'empRecords'), rec);

  const recs = await getMyToday();
  const allRecs = [...recs, rec];
  const min = calcMin(allRecs);

  // Conferma
  document.getElementById('cfIcon').textContent = type === 'entrata' ? '✅' : '🔴';
  document.getElementById('cfName').textContent = curEmp.name;
  document.getElementById('cfType').textContent = type === 'entrata' ? 'Entrata registrata' : 'Uscita registrata';
  document.getElementById('cfTime').textContent = time.slice(0,5);
  document.getElementById('cfSede').innerHTML = '📍 ' + curSede.name;
  document.getElementById('cfOre').textContent = min > 0 ? 'Ore oggi: ' + fmtMin(min) : '';
  const fill = document.getElementById('cfFill');
  fill.style.animation = 'none'; fill.offsetHeight; fill.style.animation = '';

  showScreen('confirm');
  if (cfTimer) clearTimeout(cfTimer);
  cfTimer = setTimeout(goHome, 3100);
};

init();
</script>
